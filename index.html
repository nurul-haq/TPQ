<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <title>Musholla Nurul Haq</title>
    
    <meta property="og:title" content="Musholla Nurul Haq">
    <meta property="og:description" content="Aplikasi Layanan Informasi, Kas, Qurban, dan TPQ Musholla Nurul Haq Pasuruan">
    <meta property="og:image" content="https://drive.google.com/thumbnail?id=1PeZYgbYccFYwsMs2-NTI9YmDa764-zsE&sz=w500">
    <meta property="og:type" content="website">

    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#064e3b">
    
    <link rel="icon" type="image/png" sizes="512x512" href="./logo.png">
    <link rel="apple-touch-icon" href="./logo.png">

    <style>
        /* =========================================
           1. DESAIN SPLASH SCREEN MODERN & ELEGAN
           ========================================= */
        #splash-screen {
            position: fixed;
            inset: 0;
            background-color: #064e3b; /* Hijau Emerald Musholla */
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 20000;
            transition: opacity 0.8s cubic-bezier(0.4, 0, 0.2, 1), visibility 0.8s;
            overflow: hidden;
            font-family: 'Segoe UI', system-ui, Roboto, sans-serif;
        }

        #splash-screen::before {
            content: '';
            position: absolute;
            width: 150vw;
            height: 150vw;
            background: radial-gradient(circle, rgba(16, 185, 129, 0.15) 0%, transparent 60%);
            animation: pulseGlow 6s ease-in-out infinite alternate;
            pointer-events: none;
        }

        .splash-content {
            position: relative;
            z-index: 2;
            display: flex;
            flex-direction: column;
            align-items: center;
            animation: slideUpFade 1.2s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        .logo-wrapper {
            position: relative;
            width: 150px;
            height: 150px;
            margin-bottom: 35px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .modern-spinner {
            position: absolute;
            inset: -12px;
            border-radius: 50%;
            border: 2px solid rgba(253, 224, 71, 0.1);
            border-top-color: #facc15; /* Kuning Emas */
            animation: spinRing 1s cubic-bezier(0.68, -0.55, 0.265, 1.55) infinite;
        }

        .splash-logo {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 50%;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.4);
            animation: breatheLogo 3s ease-in-out infinite;
        }

        .brand-title {
            color: #ffffff;
            font-size: 26px;
            font-weight: 900;
            letter-spacing: 1.5px;
            margin: 0 0 6px 0;
            text-shadow: 0 4px 10px rgba(0,0,0,0.3);
            text-align: center;
        }

        .brand-subtitle {
            color: #facc15; 
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 3px;
            margin: 0;
            text-transform: uppercase;
            opacity: 0.9;
        }

        .loading-dots {
            margin-top: 50px;
            display: flex;
            gap: 8px;
        }

        .loading-dots span {
            width: 8px;
            height: 8px;
            background-color: #10b981;
            border-radius: 50%;
            animation: bounceDots 1.4s infinite ease-in-out both;
        }

        .loading-dots span:nth-child(1) { animation-delay: -0.32s; }
        .loading-dots span:nth-child(2) { animation-delay: -0.16s; }

        @keyframes spinRing { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        @keyframes breatheLogo { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.04); box-shadow: 0 15px 40px rgba(0, 0, 0, 0.6); } }
        @keyframes slideUpFade { 0% { opacity: 0; transform: translateY(40px); } 100% { opacity: 1; transform: translateY(0); } }
        @keyframes pulseGlow { 0% { transform: scale(0.9); opacity: 0.6; } 100% { transform: scale(1.1); opacity: 1; } }
        @keyframes bounceDots { 0%, 80%, 100% { transform: scale(0); opacity: 0.3; } 40% { transform: scale(1); opacity: 1; } }

        .fade-out { opacity: 0; visibility: hidden; }

        /* =========================================
           2. PENGATURAN DASAR & IFRAME (PWA)
           ========================================= */
        body, html {
            margin: 0; 
            padding: 0; 
            width: 100%; 
            height: 100%;
            overflow: hidden; 
            background-color: #f4fdf8;
            font-family: sans-serif;
        }
        
        iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            border: none; 
            display: block;
            z-index: 1;
            background-color: #ffffff;
        }

        /* =========================================
           3. BANNER INSTALL
           ========================================= */
        #installBanner {
            display: none;
            position: fixed;
            bottom: 24px;
            left: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.98);
            backdrop-filter: blur(12px);
            padding: 16px;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.15);
            z-index: 10000;
            justify-content: space-between;
            align-items: center;
            box-sizing: border-box;
            border: 1px solid rgba(0,0,0,0.05);
            animation: slideUpBanner 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes slideUpBanner { 0% { transform: translateY(100%); opacity: 0; } 100% { transform: translateY(0); opacity: 1; } }

        .banner-kiri { display: flex; align-items: center; gap: 15px; }
        .banner-kiri img {
            width: 48px; height: 48px; border-radius: 12px; object-fit: cover;
            box-shadow: 0 4px 10px rgba(6, 78, 59, 0.15);
        }
        .banner-teks h6 { margin: 0 0 2px 0; font-size: 1.05rem; color: #1a202c; font-weight: 700; }
        .banner-teks small { color: #718096; font-size: 0.8rem; font-weight: 500; }

        #btnInstall {
            background: #064e3b;
            color: white; border: none; padding: 10px 20px; border-radius: 12px;
            font-weight: 600; font-size: 0.9rem; cursor: pointer; transition: all 0.2s ease;
        }
        #btnInstall:active { transform: scale(0.95); background: #047857; }

        #btnTutupBanner {
            position: absolute; top: -8px; right: -8px; background: #ffffff; color: #4a5568;
            border: 1px solid #e2e8f0; border-radius: 50%; width: 24px; height: 24px;
            font-size: 12px; cursor: pointer; display: flex; justify-content: center;
            align-items: center; box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        // --- MESIN PENDETEKSI UPDATE APLIKASI ---
  let pekerjaBaru;

  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('/sw.js').then(reg => {
      reg.addEventListener('updatefound', () => {
        pekerjaBaru = reg.installing;
        pekerjaBaru.addEventListener('statechange', () => {
          // Jika ada versi baru dan terinstal di background
          if (pekerjaBaru.state === 'installed' && navigator.serviceWorker.controller) {
            // Tampilkan Pop-Up Update!
            document.getElementById('wadahUpdateAplikasi').style.display = 'block';
          }
        });
      });
    });

    // Jika Service Worker berhasil diganti, muat ulang halaman agar versi baru tampil
    let sedangRefresh;
    navigator.serviceWorker.addEventListener('controllerchange', function () {
      if (sedangRefresh) return;
      window.location.reload();
      sedangRefresh = true;
    });
  }

  // Aksi ketika tombol "Update" di klik jamaah
  document.getElementById('btnRefreshUpdate').addEventListener('click', function() {
    document.getElementById('wadahUpdateAplikasi').style.display = 'none';
    // Kirim perintah ke sw.js untuk mengaktifkan versi baru
    if (pekerjaBaru) {
      pekerjaBaru.postMessage('skipWaiting');
    }
  });
    </style>
</head>
<body>

    <div id="splash-screen">
        <div class="splash-content">
            <div class="logo-wrapper">
                <div class="modern-spinner"></div> 
                <img src="./logo.png" alt="Logo Musholla" class="splash-logo">
            </div>
            
            <h1 class="brand-title">MUSHOLLA NURUL HAQ</h1>
            <h2 class="brand-subtitle">Pusat Ibadah & Ilmu Agama</h2>
            
            <div class="loading-dots">
                <span></span><span></span><span></span>
            </div>
        </div>
    </div>
    
    <iframe id="appFrame" allow="camera; microphone; fullscreen"></iframe>

    <div id="installBanner">
        <button id="btnTutupBanner" onclick="document.getElementById('installBanner').style.display='none'">✕</button>
        <div class="banner-kiri">
            <img src="./logo.png" alt="Logo">
            <div class="banner-teks">
                <h6>Nurul Haq</h6>
                <small>Super App Jamaah</small>
            </div>
        </div>
        <button id="btnInstall">Install</button>
    </div>
    
    <script>
        // 1. Injeksi Google Script Iframe
        const gasUrl = "https://script.google.com/macros/s/AKfycbxUkj-y3mppSeFACvJ-MVCELHw7P1VyFaCabxpj8q16UIL-SQaKO8ReoW23OuyuOGaH/exec";
        const params = window.location.search; 
        const waktuSekarang = new Date().getTime(); 
        const finalUrl = gasUrl + (params ? params + "&" : "?") + "refresh=" + waktuSekarang;
        document.getElementById('appFrame').src = finalUrl;

        // 2. Service Worker PWA Dasar
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js').catch(err => console.log('Service Worker gagal:', err));
            });
        }

        // 3. LOGIKA BANNER INSTALL OTOMATIS
        let deferredPrompt;
        const installBanner = document.getElementById('installBanner');
        const btnInstall = document.getElementById('btnInstall');

        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            installBanner.style.display = 'flex';
        });

        btnInstall.addEventListener('click', async () => {
            installBanner.style.display = 'none';
            if (deferredPrompt) {
                deferredPrompt.prompt();
                const { outcome } = await deferredPrompt.userChoice;
                console.log(`Pengguna memilih: ${outcome}`);
                deferredPrompt = null;
            }
        });

        window.addEventListener('appinstalled', () => {
            installBanner.style.display = 'none';
            deferredPrompt = null;
            console.log('Aplikasi Musholla berhasil diinstal di HP!');
        });

        // 4. Fungsi Penutup Splash Screen Mulus
        const appFrame = document.getElementById('appFrame');
        const splash = document.getElementById('splash-screen');

        appFrame.onload = function() {
            setTimeout(() => {
                splash.classList.add('fade-out');
            }, 1500); 
        };
    </script>
    <div id="wadahUpdateAplikasi" class="position-fixed bottom-0 start-50 translate-middle-x p-3 animate__animated animate__bounceInUp" style="z-index: 9999; display: none; width: 90%; max-width: 400px;">
  <div class="rounded-4 shadow-lg p-3 d-flex align-items-center justify-content-between" style="background: linear-gradient(135deg, #022c22 0%, #064e3b 100%); border: 1px solid #facc15;">
    <div class="d-flex align-items-center">
      <div class="bg-warning text-dark rounded-circle d-flex justify-content-center align-items-center me-3 shadow-sm" style="width: 35px; height: 35px;">
        <i class="fas fa-sync-alt fa-spin"></i>
      </div>
      <div>
        <h6 class="mb-0 fw-bold text-white" style="font-size: 0.9rem;">Update Tersedia!</h6>
        <span class="text-white opacity-75" style="font-size: 0.7rem;">Versi baru siap dipasang.</span>
      </div>
    </div>
    <button id="btnRefreshUpdate" class="btn btn-warning btn-sm rounded-pill fw-bold shadow-sm px-3" style="font-size: 0.75rem;">
      <i class="fas fa-download me-1"></i> Update
    </button>
  </div>
</div>
</body>
</html>
