<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TPQ Nurul Haq</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#009688">
    
    <link rel="icon" type="image/png" sizes="192x192" href="Logo%20192.png">
    <link rel="icon" type="image/png" sizes="512x512" href="Logo%20512.png">
    <link rel="apple-touch-icon" href="Logo%20192.png">

    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden; /* Mencegah scrollbar ganda antara iframe dan body */
            background-color: #009688; /* Warna saat iframe sedang loading */
        }
        iframe {
            width: 100%;
            height: 100%;
            border: none;
            display: block;
        }
    </style>
</head>
<body>

    <iframe src="https://script.google.com/macros/s/AKfycbxUkj-y3mppSeFACvJ-MVCELHw7P1VyFaCabxpj8q16UIL-SQaKO8ReoW23OuyuOGaH/exec" allow="camera; microphone; fullscreen"></iframe>

    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('./sw.js')
            .then((reg) => console.log('Service Worker berhasil didaftarkan!', reg.scope))
            .catch((err) => console.log('Service Worker gagal didaftarkan:', err));
        });
      }
    </script>
    
</body>
</html>
